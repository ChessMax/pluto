include: package:lints/recommended.yaml

formatter:
  trailing_commas: preserve

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  exclude:
    - lib/**/*.g.dart

linter:
  rules:
    - unawaited_futures
    - always_declare_return_types
    - avoid_relative_lib_imports
    - close_sinks
    - cancel_subscriptions
    - avoid_void_async